<!DOCTYPE html><html><head><meta charset="UTF-8"></head>
<body style="font-family:Arial,sans-serif;color:#333;margin:0;padding:0;background:#f4f4f4">
<div style="max-width:600px;margin:20px auto;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)">
  <div style="background:#6b2fa0;padding:24px 30px">
    <h2 style="color:#fff;margin:0;font-size:20px">Wilchers Waanzinnige Wereld</h2>
    <p style="color:#e0c8f8;margin:4px 0 0;font-size:14px">Nieuwe formulierinzending</p>
  </div>
  <div style="padding:24px 30px">
    <h3 style="color:#6b2fa0;margin-top:0">{{var form_title}}</h3>
    <p style="margin:0 0 4px"><strong>Ontvangen:</strong> {{var timestamp}}</p>
    <p style="margin:0 0 16px"><strong>Van:</strong> {{var submitter_name}} &lt;{{var submitter_email}}&gt;</p>
    <hr style="border:none;border-top:1px solid #e8dff5;margin:0 0 16px"/>
    {{var body_html}}
  </div>
  <div style="background:#f5f0fa;padding:12px 30px;font-size:12px;color:#888;text-align:center">
    Wilchers Waanzinnige Wereld &mdash; wilma@wilcherswaanzinnigewereld.nl
  </div>
</div>
</body></html>
